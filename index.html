    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Montserrat:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #000;
        color: #fff;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Montserrat', sans-serif;
      }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      /* Safe Area Padding for Mobile Bottom Nav */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      
      /* Receipt Jagged Edge Pattern */
      .receipt-jagged-edge {
        background-image: 
          linear-gradient(45deg, transparent 50%, #fff 50%),
          linear-gradient(-45deg, transparent 50%, #fff 50%);
        background-position: bottom;
        background-size: 16px 16px;
        background-repeat: repeat-x;
        height: 16px;
        width: 100%;
      }
      .receipt-jagged-edge-dark {
         background-image: 
          linear-gradient(45deg, transparent 50%, #18181b 50%),
          linear-gradient(-45deg, transparent 50%, #18181b 50%);
        background-position: bottom;
        background-size: 16px 16px;
        background-repeat: repeat-x;
        height: 16px;
        width: 100%;
      }
    </style>
